# Full Yoker configuration reference.
# Copy this file to ./yoker.toml or ~/.yoker.toml and adjust as needed.
# Yoker auto-discovers ./yoker.toml first, then ~/.yoker.toml, then defaults.

[harness]
name = "my-yoke"
version = "1.0"

[backend]
provider = "ollama"
# Other supported providers: "openai", "anthropic", "gemini",
# or any litellm-supported provider (e.g. "groq", "cohere", "azure", "mistral").

[backend.ollama]
base_url = "http://localhost:11434"
api_key = ""  # Optional API key for authenticated Ollama endpoints
model = "qwen3.5:cloud"
timeout_seconds = 60

# --- Alternative provider configs (uncomment and set provider above) ---
# [backend.openai]
# api_key = "${OPENAI_API_KEY}"  # Interpolated from environment variables
# model = "gpt-4o-mini"
# timeout_seconds = 60
#
# [backend.anthropic]
# api_key = "${ANTHROPIC_API_KEY}"
# model = "claude-haiku-4-5"
# timeout_seconds = 60
#
# [backend.gemini]
# api_key = "${GEMINI_API_KEY}"
# model = "gemini-2.5-flash-lite"
# timeout_seconds = 60
#
# [backend.generic]  # For any litellm-supported provider not listed above
# api_key = "${GROQ_API_KEY}"
# model = "groq/llama-3.1-8b-instant"
# timeout_seconds = 60

[backend.ollama.parameters]
temperature = 0.7
top_p = 0.9
top_k = 40
num_ctx = 4096

[context]
manager = "basic_persistence"
storage_path = "./context"
session_id = "auto"
persist_after_turn = true

[permissions]
filesystem_paths = ["."]
network_access = "none"
max_file_size_kb = 500

[tools.list]
enabled = true
max_depth = 5
max_entries = 2000

[tools.read]
enabled = true
allowed_extensions = [
  ".txt",
  ".md",
  ".json",
  ".yaml",
  ".yml",
  ".toml",
  ".py",
  ".js",
  ".ts",
  ".html",
  ".css",
]

[tools.write]
enabled = true
allow_overwrite = false
max_size_kb = 1000

[tools.update]
enabled = true
require_exact_match = true
max_diff_size_kb = 100

[tools.search]
enabled = true
max_regex_complexity = "medium"
max_results = 500
timeout_ms = 10000

[tools.agent]
enabled = true
timeout_seconds = 300

[tools.git]
enabled = true
allowed_commands = ["status", "log", "diff", "branch", "show"]
requires_permission = ["commit", "push"]

[tools.mkdir]
enabled = true
max_depth = 20

[tools.websearch]
enabled = true
backend = "ollama"
max_results = 10
max_query_length = 500
timeout_seconds = 30

[tools.webfetch]
enabled = true
backend = "ollama"
timeout_seconds = 30
max_size_kb = 2048
max_redirects = 5

[tools.content_display]
verbosity = "summary"
max_content_lines = 50
max_content_bytes = 4096
show_diff_for_updates = true
max_diff_lines = 30

[agents]
# Agent reference: a filesystem path to a definition file, or a name resolved
# against the AgentRegistry (populated from `directories` below and loaded
# plugins). To use a plugin agent, load the plugin with --with <pkg> (or
# [plugins].packages) and reference it by bare or namespaced name, e.g. "demo"
# or "yoker_plugin_demo:demo".
definition = ""
# Directories scanned by the /agents command.
directories = ["./agents"]

[skills]
# Directories scanned for skill definitions.
directories = ["./skills"]
# Show a skill discovery block at startup.
discovery = true

[plugins]
# Enable package plugin loading globally.
enabled = true
# Plugin packages to load automatically.
packages = []
# Trusted plugin names: key = package name, value = true.
trusted = {}

[logging]
level = "INFO"
format = "text"
file = ""
include_tool_calls = true
include_permission_checks = true

[ui]
mode = "interactive"
# These flags default to true in interactive mode and false in batch mode.
# Uncomment to override the defaults.
# show_thinking = true
# show_tool_calls = true
# show_stats = true
